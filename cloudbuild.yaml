# =============================================================================
# cloudbuild.yaml — Wafrivet Field Vet Phase 6
# Automated build → push → deploy → health-check pipeline for Cloud Build.
#
# Trigger this pipeline in one of two ways:
#   1. Cloud Build GitHub trigger (push to main — configure in GCP console)
#   2. GitHub Actions workflow (.github/workflows/deploy.yml) via WIF
#
# Substitution variables (can be overridden by caller without editing this file):
#   _SERVICE_NAME  — Cloud Run service name          (default: fieldvet-backend)
#   _REGION        — GCP region                      (default: us-central1)
#   _REPO          — Artifact Registry repo base URL (default: us-central1-docker.pkg.dev/wafrivet-agent/fieldvet-images)
#
# Built-in Cloud Build substitutions used here:
#   $PROJECT_ID  — GCP project ID injected by Cloud Build at runtime
#   $SHORT_SHA   — first 7 chars of the triggering git commit SHA
# =============================================================================

substitutions:
  _SERVICE_NAME: fieldvet-backend
  _REGION: us-central1
  _REPO: us-central1-docker.pkg.dev/wafrivet-agent/fieldvet-images
  _SHORT_SHA: latest   # overridden at submit time with the git commit SHA

timeout: 1200s          # 20-minute total budget — generous for multi-arch build + deploy

options:
  machineType: E2_HIGHCPU_8    # 8 vCPU — accelerates Docker layer builds
  logging: CLOUD_LOGGING_ONLY  # send build logs to Cloud Logging (no GCS bucket needed)
  substitutionOption: ALLOW_LOOSE  # don't fail on unused substitutions

steps:
  # ─────────────────────────────────────────────────────────────────────────
  # STEP 1 — Build Docker image
  #
  # The Dockerfile lives at the repo root and copies ./backend into the image.
  # Two tags are applied in a single build so both share the same layer cache:
  #   :$SHORT_SHA  — immutable reference for rollback (traceable to this commit)
  #   :latest      — floating tag — always points to the most recent build
  # ─────────────────────────────────────────────────────────────────────────
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --platform
      - linux/amd64
      - --tag
      - ${_REPO}/backend:${_SHORT_SHA}
      - --tag
      - ${_REPO}/backend:latest
      - --file
      - Dockerfile
      - .        # build context is the repo root (Dockerfile references ./backend/)

  # ─────────────────────────────────────────────────────────────────────────
  # STEP 2 — Push both tags to Artifact Registry
  #
  # --all-tags pushes both the SHA tag and the latest tag in a single layer
  # transfer.  The Cloud Build service account needs roles/artifactregistry.writer
  # on the repository (granted by scripts/setup-iam.sh).
  # ─────────────────────────────────────────────────────────────────────────
  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REPO}/backend
    waitFor:
      - build

  # ─────────────────────────────────────────────────────────────────────────
  # STEP 3 — Deploy to Cloud Run
  #
  # Flags mirror the Phase 4 manual deployment in deploy/deploy.sh exactly so
  # automated and manual deploys produce identical configurations.
  #
  # Secrets are bound from Secret Manager using --set-secrets so they NEVER
  # appear in build logs or environment variable plain text.
  # ─────────────────────────────────────────────────────────────────────────
  - id: cleanup-legacy-config-secrets
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - services
      - update
      - ${_SERVICE_NAME}
      - --region=${_REGION}
      - --project=$PROJECT_ID
      - --remove-secrets=GOOGLE_CLOUD_LOCATION,GOOGLE_GENAI_USE_VERTEXAI,WAFRIVET_LIVE_MODEL
    waitFor:
      - push

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=${_REPO}/backend:${_SHORT_SHA}
      - --region=${_REGION}
      - --project=$PROJECT_ID

      # Identity ────────────────────────────────────────────────────────────
      - --service-account=fieldvet-backend@$PROJECT_ID.iam.gserviceaccount.com
      - --allow-unauthenticated

      # WebSocket-optimised scaling settings ───────────────────────────────
      - --timeout=3600
      - --min-instances=1
      - --max-instances=10
      - --concurrency=80
      - --memory=1Gi
      - --cpu=1
      - --port=8080
      - --session-affinity

      # Non-secret runtime configuration ───────────────────────────────────
      # GOOGLE_CLOUD_PROJECT is kept as a Secret Manager secret because it is
      # a project identifier tied to billing credentials.  GOOGLE_CLOUD_LOCATION
      # and the model name are non-sensitive config values set as plain env vars.
      - --set-env-vars=GOOGLE_CLOUD_LOCATION=us-central1,GOOGLE_GENAI_USE_VERTEXAI=TRUE,WAFRIVET_LIVE_MODEL=gemini-live-2.5-flash-native-audio

      # Secret Manager bindings ─────────────────────────────────────────────
      # Format: ENV_VAR_NAME=SECRET_MANAGER_SECRET_NAME:VERSION
      # The Cloud Run service account needs secretAccessor on each secret.
      # scripts/setup-iam.sh grants this during one-time IAM setup.
      - --set-secrets=GOOGLE_API_KEY=GOOGLE_API_KEY:latest,SUPABASE_URL=SUPABASE_URL:latest,SUPABASE_SERVICE_ROLE_KEY=SUPABASE_SERVICE_ROLE_KEY:latest,PAYSTACK_SECRET_KEY=PAYSTACK_SECRET_KEY:latest,GOOGLE_CLOUD_PROJECT=GOOGLE_CLOUD_PROJECT:latest,GOOGLE_MAPS_KEY=GOOGLE_MAPS_KEY:latest,TERMII_API_KEY=TERMII_API_KEY:latest,TERMII_SENDER_ID=TERMII_SENDER_ID:latest

      # Health probes ───────────────────────────────────────────────────────
      # Startup probe: allow up to 60 s for ADK + Supabase client cold-start.
      - --startup-probe=httpGet.path=/health,httpGet.port=8080,initialDelaySeconds=10,failureThreshold=5,periodSeconds=10,timeoutSeconds=5
      # Liveness probe: detect hung containers every 30 s and restart them.
      - --liveness-probe=httpGet.path=/health,httpGet.port=8080,periodSeconds=30,failureThreshold=3,timeoutSeconds=5
    waitFor:
      - cleanup-legacy-config-secrets

  # ─────────────────────────────────────────────────────────────────────────
  # STEP 4 — Health check loop
  #
  # Retrieves the Cloud Run service URL then polls /health for up to 50 s
  # (10 attempts × 5-second waits).  Exits 0 on the first HTTP 200 response
  # so the build is marked SUCCESS.  Exits 1 after all attempts fail so the
  # build is marked FAILURE and Cloud Build alerts are triggered.
  #
  # Note: $$ is used for bash variables ($$SERVICE_URL, $$STATUS, $$i) to
  # prevent Cloud Build's YAML substitution engine from interpreting them as
  # Cloud Build substitution variables ($$  → literal $ in build step shell).
  # ─────────────────────────────────────────────────────────────────────────
  - id: health-check
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - '-c'
      - |
        echo "=== Retrieving Cloud Run service URL ==="
        SERVICE_URL=$$(gcloud run services describe ${_SERVICE_NAME} \
          --region=${_REGION} \
          --project=$PROJECT_ID \
          --format="value(status.url)")

        echo "Service URL: $$SERVICE_URL"
        echo "Health endpoint: $$SERVICE_URL/health"
        echo ""

        MAX_ATTEMPTS=10
        WAIT_SECONDS=5
        ATTEMPT=0

        echo "=== Starting health check loop (max $$MAX_ATTEMPTS attempts) ==="
        while [[ $$ATTEMPT -lt $$MAX_ATTEMPTS ]]; do
          ATTEMPT=$$((ATTEMPT + 1))
          echo "Attempt $$ATTEMPT of $$MAX_ATTEMPTS..."

          HTTP_STATUS=$$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 10 \
            "$$SERVICE_URL/health" || echo "000")

          echo "  HTTP status: $$HTTP_STATUS"

          if [[ "$$HTTP_STATUS" == "200" ]]; then
            echo ""
            echo "✓ /health returned HTTP 200 — deployment is healthy"
            echo "  Service URL : $$SERVICE_URL"
            echo "  Commit SHA  : ${_SHORT_SHA}"
            exit 0
          fi

          if [[ $$ATTEMPT -lt $$MAX_ATTEMPTS ]]; then
            echo "  Not ready yet — waiting $${WAIT_SECONDS}s before next attempt..."
            sleep $$WAIT_SECONDS
          fi
        done

        echo ""
        echo "✗ Health check failed after $$MAX_ATTEMPTS attempts"
        echo "  Final HTTP status: $$HTTP_STATUS"
        echo "  View logs with:"
        echo "    gcloud run services logs read ${_SERVICE_NAME} --region=${_REGION} --project=$PROJECT_ID --limit=50"
        exit 1
    waitFor:
      - deploy

# ─────────────────────────────────────────────────────────────────────────────
# images — register both tags with Cloud Build's artifact tracking
#
# Listing images here causes Cloud Build to record them in build history so
# operators can look up "which SHA is in production" from the GCP console.
# ─────────────────────────────────────────────────────────────────────────────
images:
  - ${_REPO}/backend:${_SHORT_SHA}
  - ${_REPO}/backend:latest
