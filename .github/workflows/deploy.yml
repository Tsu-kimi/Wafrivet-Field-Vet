# =============================================================================
# .github/workflows/deploy.yml — Wafrivet Field Vet Phase 6
#
# Automated deployment pipeline: every push to the main branch triggers a
# full Cloud Build run (build → push → deploy → health-check) with ZERO
# manual steps and NO service account JSON key stored in GitHub.
#
# Authentication uses Workload Identity Federation (WIF) — the keyless GCP
# auth pattern for GitHub Actions.  Run scripts/setup-iam.sh once to create
# the Workload Identity Pool and Provider, then add two GitHub repository
# secrets (see infra/README.md for the exact values).
#
# Required GitHub repository secrets:
#   GCP_CREDENTIALS_JSON — contents of the GCP service account key JSON file
# =============================================================================

name: Deploy to Cloud Run

on:
  # Trigger only on direct pushes to main — pull requests are NOT deployed
  # so unreviewed code never reaches production Cloud Run.
  push:
    branches:
      - main

env:
  PROJECT_ID: wafrivet-agent
  REGION: us-central1

jobs:
  deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest

    permissions:
      # contents:read  — allows actions/checkout to fetch the repository
      contents: read

    steps:
      # ───────────────────────────────────────────────────────────────────
      # 1. Checkout the repository at the commit that triggered this run
      # ───────────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ───────────────────────────────────────────────────────────────────
      # 2. Authenticate to Google Cloud using a service account JSON key
      #
      # Store the full contents of your GCP service account key JSON as a
      # GitHub repository secret named GCP_CREDENTIALS_JSON.
      # ───────────────────────────────────────────────────────────────────
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS_JSON }}

      # ───────────────────────────────────────────────────────────────────
      # 3. Submit Cloud Build job using the existing cloudbuild.yaml
      #
      # gcloud builds submit uses cloudbuild.yaml which already handles:
      #   Step 1 — docker build (SHA-tagged + latest)
      #   Step 2 — docker push --all-tags to fieldvet-images Artifact Registry
      #   Step 3 — gcloud run deploy
      #   Step 4 — health check loop
      #
      # This avoids the deploy-cloudrun@v2 --source . path which tries to
      # create a NEW cloud-run-source-deploy repo and ignores cloudbuild.yaml.
      # ───────────────────────────────────────────────────────────────────
      - name: Deploy to Cloud Run via Cloud Build
        env:
          PROJECT_ID: ${{ env.PROJECT_ID }}
          REGION: ${{ env.REGION }}
        run: |
          SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
          echo "SHORT_SHA is: $SHORT_SHA"
          gcloud builds submit \
            --config cloudbuild.yaml \
            --project "$PROJECT_ID" \
            --substitutions "_SERVICE_NAME=fieldvet-backend,_REGION=$REGION,_SHORT_SHA=$SHORT_SHA" \
            .
